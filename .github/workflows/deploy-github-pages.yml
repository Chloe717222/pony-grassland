# 推送到 main 后自动发布到 GitHub Pages。
# 仓库 Settings → Pages → Source 选「GitHub Actions」。
# 若仍失败：Settings → Actions → General → Workflow permissions → 选「Read and write permissions」并保存。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 页面运行时只读 data.json / data.embed.js，不直接读 CSV；发布前必须重建，否则只改 CSV 线上仍是旧数据
      - name: Rebuild data.json and data.embed.js from content/*.csv
        run: npm run build:data
      # 祝福 PNG/JPG/WebP/音视频可仅放在 COS：仓库不强制包含这些二进制，故跳过其磁盘存在检查
      - name: Verify grassland site and content/
        env:
          SKIP_BLESSING_MEDIA_DISK_CHECK: "1"
        run: node scripts/verify-site-assets.mjs
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
